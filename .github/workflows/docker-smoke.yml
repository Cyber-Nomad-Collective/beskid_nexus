name: Container smoke (Podman)

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  packages: read

concurrency:
  group: container-smoke-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build-image:
    runs-on: ubuntu-latest
    env:
      NODE_AUTH_TOKEN: ${{ secrets.NODE_AUTH_TOKEN || secrets.GITHUB_TOKEN }}
    steps:
      - uses: actions/checkout@v4

      - name: Install Podman
        run: |
          sudo apt-get update
          sudo apt-get install -y podman

      - name: Build Nexus image
        run: podman build --build-arg NODE_AUTH_TOKEN="${NODE_AUTH_TOKEN}" -t beskid-nexus:ci .

      - name: Run container with empty volume
        run: |
          podman run -d --name nexus-smoke \
            -e SESSION_SECRET=ci-smoke-secret-at-least-32-chars \
            -e GITNEXUS_HOME=/data/gitnexus \
            -p 18452:8452 \
            beskid-nexus:ci
          for i in $(seq 1 60); do
            if curl -sf http://127.0.0.1:18452/api/health; then
              echo "Health OK"
              curl -sf http://127.0.0.1:18452/api/catalog
              exit 0
            fi
            sleep 2
          done
          podman logs nexus-smoke
          exit 1

name: Container smoke (Podman)

on:
  push:
    branches: [main]
  workflow_dispatch:

concurrency:
  group: container-smoke-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build-image:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Install Podman
        run: |
          sudo apt-get update
          sudo apt-get install -y podman

      - name: Init compiler submodule
        run: git -c protocol.version=2 submodule update --init --depth 1 compiler

      - name: Build Nexus image (index + web UI)
        run: podman build -t beskid-nexus:ci .

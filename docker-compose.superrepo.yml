# Beskid superrepo local/CI build (context = parent of beskid_nexus/).
services:
  nexus:
    build:
      context: ..
      dockerfile: beskid_nexus/Dockerfile
    restart: unless-stopped
    ports:
      - "8452:8452"
    environment:
      GITNEXUS_HOME: /data/gitnexus
      NEXUS_MCP_AUTH_TOKEN: ${NEXUS_MCP_AUTH_TOKEN:-}
      PORT: "8452"
      GITNEXUS_SERVE_HOST: "0.0.0.0"
      GITHUB_CLIENT_ID: ${GITHUB_CLIENT_ID:-}
      GITHUB_CLIENT_SECRET: ${GITHUB_CLIENT_SECRET:-}
      GITHUB_OAUTH_CALLBACK_URL: ${GITHUB_OAUTH_CALLBACK_URL:-}
      SESSION_SECRET: ${SESSION_SECRET:-}
      NEXUS_ADMIN_GITHUB_LOGINS: ${NEXUS_ADMIN_GITHUB_LOGINS:-}
      NEXUS_SETUP_TOKEN: ${NEXUS_SETUP_TOKEN:-}
      GITHUB_WEBHOOK_SECRET: ${GITHUB_WEBHOOK_SECRET:-}
    volumes:
      - nexus-data:/data/gitnexus
    healthcheck:
      test: ["CMD-SHELL", "wget -q --spider http://127.0.0.1:8452/api/health || exit 1"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 60s

volumes:
  nexus-data:

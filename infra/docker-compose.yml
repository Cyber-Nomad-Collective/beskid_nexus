# Coolify entrypoint (see ../COOLIFY.md). Build context is the superrepo root.
services:
  nexus:
    build:
      context: ..
      dockerfile: beskid_nexus/Dockerfile
    restart: unless-stopped
    expose:
      - "80"
    environment:
      NEXUS_MCP_AUTH_TOKEN: ${NEXUS_MCP_AUTH_TOKEN:-}
    healthcheck:
      test: ["CMD-SHELL", "wget -q --spider http://127.0.0.1/api/health || exit 1"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 60s
